<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Protocolo Digital - Completo</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 text-white">

<div class="p-6">

<h1 class="text-3xl font-bold mb-6">📊 Diagnóstico de Transformação Digital</h1>

<!-- FILTROS -->
<div class="flex gap-4 mb-6">

<select id="filtroCliente" class="text-black p-2 rounded"></select>

<select id="filtroStatus" class="text-black p-2 rounded">
<option value="all">Todos os Status</option>
<option value="Crítico">Crítico</option>
<option value="Atenção">Atenção</option>
<option value="Ideal">Ideal</option>
</select>

</div>

<!-- KPIs -->
<div class="grid grid-cols-4 gap-4 mb-6">
<div class="bg-gray-800 p-4 rounded">
Total de Clientes
<div class="text-2xl font-bold" id="clientes"></div>
</div>

<div class="bg-green-700 p-4 rounded">
% Digital
<div class="text-2xl font-bold" id="digital"></div>
</div>

<div class="bg-red-700 p-4 rounded">
% Físico
<div class="text-2xl font-bold" id="fisico"></div>
</div>

<div class="bg-blue-700 p-4 rounded">
Nível Geral
<div class="text-2xl font-bold" id="nivel"></div>
</div>
</div>

<!-- GRÁFICOS -->
<div class="grid grid-cols-3 gap-6 mb-6">

<div class="col-span-2 bg-gray-800 p-4 rounded">
<canvas id="barChart"></canvas>
</div>

<div class="bg-gray-800 p-4 rounded flex justify-center items-center">
<div style="width:200px">
<canvas id="pieChart"></canvas>
</div>
</div>

</div>

<!-- RANKING -->
<div class="bg-gray-800 p-4 rounded">

<h2 class="text-xl mb-4">🏆 Ranking de Digitalização</h2>

<table class="w-full text-sm text-center">
<thead>
<tr>
<th>Cliente</th>
<th>% Digital</th>
<th>Status</th>
</tr>
</thead>
<tbody id="ranking"></tbody>
</table>

</div>

</div>

<script>

const dados = [
{cliente:"Itu CIS", digital:0, fisico:0},
{cliente:"Caieiras", digital:5736, fisico:145},
{cliente:"Caçapava PM", digital:975, fisico:740},
{cliente:"Taboão da Serra", digital:2682, fisico:5519},
{cliente:"Santo Antonio da Alegria PM", digital:86, fisico:208},
{cliente:"Poá", digital:453, fisico:3710},
{cliente:"Ferraz de Vasconvelos CM", digital:0, fisico:0},
{cliente:"Sorocaba URBES", digital:0, fisico:0},
{cliente:"Itapeva IPMI", digital:0, fisico:0},
{cliente:"Bauru FunPrev", digital:5, fisico:900},
{cliente:"Ferraz de Vasconcelos PM", digital:11, fisico:6152},
{cliente:"Embu Guaçu PM", digital:2, fisico:1836},
{cliente:"Cabreúva CM", digital:0, fisico:311},
{cliente:"Caieiras Prev", digital:0, fisico:43},
{cliente:"Cajuru PM", digital:0, fisico:913},
{cliente:"Jandira PM", digital:0, fisico:4207},
{cliente:"Rio Claro Fundação", digital:0, fisico:1620},
{cliente:"Itu PM", digital:0, fisico:5055},
{cliente:"Limeira CEPROSOM", digital:0, fisico:3},
{cliente:"Rio Claro PM", digital:0, fisico:979},
{cliente:"Santa Cruz da Esperança PM", digital:0, fisico:77},
{cliente:"Sorocaba PM", digital:0, fisico:275},
{cliente:"Tiete SAMAE", digital:0, fisico:795},
{cliente:"Caçapava Fusam", digital:0, fisico:0},
{cliente:"Cubatão", digital:595, fisico:316},
{cliente:"Caçapava CM", digital:2, fisico:4},
{cliente:"Mococa", digital:35, fisico:5387},
{cliente:"Itapeva PM", digital:5187, fisico:0},
{cliente:"Cabreúva PM", digital:1832, fisico:0},
{cliente:"Bebedouro SAAE", digital:299, fisico:0},
{cliente:"Bebedouro Sasemb", digital:29, fisico:0},
{cliente:"Mairiporã IPREMA", digital:94, fisico:0},
{cliente:"Santo Antonio do Jardim PM", digital:604, fisico:0},
{cliente:"Bragança", digital:13432, fisico:1},
{cliente:"Cordeiropolis PM", digital:3871, fisico:2},
{cliente:"Mairiporã PM", digital:7285, fisico:4},
{cliente:"Bebedouro", digital:9356, fisico:10},
{cliente:"Barra Bonita PM", digital:2466, fisico:4},
{cliente:"Itirapina PM", digital:1126, fisico:13}
];

// CLASSIFICAÇÃO
function classificar(p){
if(p === 0) return "Crítico";
if(p < 50) return "Atenção";
return "Ideal";
}

// COR
function cor(status){
if(status==="Crítico") return "bg-red-600";
if(status==="Atenção") return "bg-yellow-500";
return "bg-green-600";
}

// FILTRO
function aplicarFiltro(){
let cliente = document.getElementById("filtroCliente").value;
let status = document.getElementById("filtroStatus").value;

let lista = dados.map(d=>{
let total = d.digital + d.fisico;
let perc = total ? (d.digital/total)*100 : 0;
return {...d, perc};
});

if(cliente !== "all"){
lista = lista.filter(d=>d.cliente === cliente);
}

if(status !== "all"){
lista = lista.filter(d=>classificar(d.perc) === status);
}

render(lista);
}

// KPIs
function atualizarKPIs(lista){
let td = lista.reduce((a,b)=>a+b.digital,0);
let tf = lista.reduce((a,b)=>a+b.fisico,0);
let total = td+tf;
let perc = (td/total)*100;

document.getElementById("clientes").innerText = lista.length;
document.getElementById("digital").innerText = perc.toFixed(1)+"%";
document.getElementById("fisico").innerText = (100-perc).toFixed(1)+"%";
document.getElementById("nivel").innerText = classificar(perc);
}

// RANKING
function atualizarRanking(lista){
let html="";

lista.sort((a,b)=>b.perc-a.perc);

lista.forEach(d=>{
let status = classificar(d.perc);
html+=`
<tr>
<td>${d.cliente}</td>
<td>${d.perc.toFixed(1)}%</td>
<td class="${cor(status)} text-black font-bold">${status}</td>
</tr>`;
});

document.getElementById("ranking").innerHTML = html;
}

// GRÁFICOS
let barChart, pieChart;

function atualizarGraficos(lista){

let top = lista.slice(0,15);

let labels = top.map(d=>d.cliente);
let digital = top.map(d=>d.digital);
let fisico = top.map(d=>d.fisico);

if(barChart) barChart.destroy();
if(pieChart) pieChart.destroy();

barChart = new Chart(document.getElementById("barChart"),{
type:'bar',
data:{labels,datasets:[{label:'Digital',data:digital},{label:'Físico',data:fisico}]}
});

let td = lista.reduce((a,b)=>a+b.digital,0);
let tf = lista.reduce((a,b)=>a+b.fisico,0);

pieChart = new Chart(document.getElementById("pieChart"),{
type:'doughnut',
data:{labels:['Digital','Físico'],datasets:[{data:[td,tf]}]}
});
}

// INIT
function iniciar(){

let select = document.getElementById("filtroCliente");

select.innerHTML = '<option value="all">Todos os clientes</option>';

dados.forEach(d=>{
let opt = document.createElement("option");
opt.value = d.cliente;
opt.text = d.cliente;
select.appendChild(opt);
});

document.getElementById("filtroCliente").onchange = aplicarFiltro;
document.getElementById("filtroStatus").onchange = aplicarFiltro;

aplicarFiltro();
}

function render(lista){
atualizarKPIs(lista);
atualizarRanking(lista);
atualizarGraficos(lista);
}

iniciar();

</script>

</body>
</html>
